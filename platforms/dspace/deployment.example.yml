# ChengetAi Deploy v3 — master deployment configuration.
# This is the SINGLE SOURCE OF TRUTH. Every generated file
# (docker-compose.yml, Caddyfile, .env, local.cfg, config.yml, healthcheck.sh)
# is rendered from these values. Nothing else contains a domain, IP or secret.

deployment:
  id: dare                      # short, lowercase; names volumes/network/project
  platform: dspace

institution:
  name: Dare Digital Repository

domain:
  public: repo.dare.co.zw       # the public hostname
  ssl: true                     # true → Caddy gets Let's Encrypt certs automatically
  dns_provider: manual          # manual | cloudflare | route53 (automation optional)

ports:
  ui: 4000                      # container ports; Caddy is the only public entrypoint
  api: 8080

database:
  engine: postgres

admin:
  email: admin@dare.co.zw
  # password is taken from $ADMIN_PASSWORD at generate time, else generated

branding:
  logo:                         # optional path to a logo PNG
  favicon:                      # optional path to a favicon PNG

storage:
  assetstore: docker-volume     # docker-volume | host-path
