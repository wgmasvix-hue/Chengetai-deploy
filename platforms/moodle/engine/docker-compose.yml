services:
  mariadb:
    image: mariadb:11
    container_name: moodle-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword123
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: changeme123
    volumes:
      - ./data/mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: moodle-redis
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: moodle-php
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    volumes:
      - ./moodle:/var/www/html
      - ./data/moodledata:/var/www/moodledata

  nginx:
    image: nginx:alpine
    container_name: moodle-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8082:80"
    volumes:
      - ./moodle:/var/www/html
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  default:
    name: moodle-network
