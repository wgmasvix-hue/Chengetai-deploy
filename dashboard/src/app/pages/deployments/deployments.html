<h1>📚 Deployments</h1>
<div class="cards">
  <div class="card" *ngFor="let d of deployments()">
    <h3>{{ d.repository || d.name }}</h3>
    <p class="muted">{{ d.institution }}</p>
    <p><b>Platform:</b> {{ d.platform }}</p>
    <p><b>Ports:</b> UI {{ d.uiPort }}, REST {{ d.restPort }}</p>
    <span class="badge" [class.ready]="d.engineReady">{{ d.engineReady ? 'Deployed' : 'Not deployed' }}</span>
  </div>
  <p class="muted" *ngIf="!deployments().length">No deployments on this server yet.</p>
</div>
