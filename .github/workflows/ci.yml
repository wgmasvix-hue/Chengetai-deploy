name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check all shell scripts
        run: |
          fail=0
          for f in chengetai install-cli.sh lib/*.sh templates/*/plugin.sh; do
            bash -n "$f" || fail=1
          done
          exit $fail
      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # Advisory: report but don't fail the build on style findings.
          shellcheck -S error lib/*.sh templates/*/plugin.sh || true

  api:
    name: API build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm install
      - run: npm test

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm install
      - run: npx ng build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: npm audit (advisory)
        run: |
          (cd api && npm install --package-lock-only && npm audit --audit-level=high) || true
          (cd dashboard && npm audit --audit-level=high) || true
