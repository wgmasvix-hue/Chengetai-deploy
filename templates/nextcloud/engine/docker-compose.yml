# ChengetAi Deploy — Nextcloud stack (official images).
# Instantiated per deployment into deployments/<name>/engine/ with a
# generated .env. Compose project name is chengetai-<deployment>.
# Nextcloud auto-installs on first boot from the admin + database env, so
# there is no web installer. Image tags: chengetai edit config <name>

networks:
  ncnet:

services:
  nextcloud-db:
    image: mariadb:11.4
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=nextcloud
      - MARIADB_USER=nextcloud
      - MARIADB_PASSWORD=${DB_PASSWORD}
    networks:
      - ncnet
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  nextcloud:
    image: nextcloud:apache
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASS}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NC_TRUSTED_DOMAINS}
      - OVERWRITEHOST=${NC_TRUSTED_DOMAINS}
    networks:
      - ncnet
    ports:
      - "0.0.0.0:${UI_PORT}:80"
    volumes:
      - nextcloud_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s

volumes:
  db_data:
  nextcloud_data:
