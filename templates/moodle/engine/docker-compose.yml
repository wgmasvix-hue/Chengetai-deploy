# ChengetAi Deploy — Moodle stack (official Bitnami images).
# Instantiated per deployment into deployments/<name>/engine/ with a
# generated .env (SERVER_IP, UI_PORT, DB_PASSWORD, DB_ROOT_PASSWORD,
# MOODLE_ADMIN_USER/PASS/EMAIL, MOODLE_SITE_NAME). Compose project name is
# chengetai-<deployment>, so deployments never collide.
#
# Image tags can be changed with: chengetai edit config <name>

networks:
  moodlenet:

services:
  moodle-db:
    image: docker.io/bitnami/mariadb:11.4
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    networks:
      - moodlenet
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  moodle:
    image: docker.io/bitnami/moodle:4.5
    restart: unless-stopped
    depends_on:
      moodle-db:
        condition: service_healthy
    environment:
      - MOODLE_DATABASE_TYPE=mariadb
      - MOODLE_DATABASE_HOST=moodle-db
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_DATABASE_PASSWORD=${DB_PASSWORD}
      # Admin account created on first boot (no web installer needed).
      - MOODLE_USERNAME=${MOODLE_ADMIN_USER}
      - MOODLE_PASSWORD=${MOODLE_ADMIN_PASS}
      - MOODLE_EMAIL=${MOODLE_ADMIN_EMAIL}
      - MOODLE_SITE_NAME=${MOODLE_SITE_NAME}
      - ALLOW_EMPTY_PASSWORD=no
    networks:
      - moodlenet
    ports:
      - "0.0.0.0:${UI_PORT}:8080"
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    # First boot installs Moodle and creates the admin — allow generous time.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/login/index.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

volumes:
  mariadb_data:
  moodle_data:
  moodledata_data:
