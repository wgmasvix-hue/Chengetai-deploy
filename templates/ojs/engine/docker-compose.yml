# ChengetAi Deploy — OJS (Open Journal Systems) stack.
# Official PKP image (pkpofficial/ojs) + MariaDB. Instantiated per deployment
# into deployments/<name>/engine/ with a generated .env and local volume dirs.
# Compose project name is chengetai-<deployment>, so deployments never collide.
#
# Setup completes in OJS's one-time web installer (see the plugin notes).
# Image tag can be changed with: chengetai edit config <name>

networks:
  ojsnet:

services:
  ojs-db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=ojs
      - MARIADB_USER=ojs
      - MARIADB_PASSWORD=${DB_PASSWORD}
    networks:
      - ojsnet
    volumes:
      - ojs_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  ojs:
    image: pkpofficial/ojs:3_3_0-21
    restart: unless-stopped
    depends_on:
      ojs-db:
        condition: service_healthy
    environment:
      - OJS_DB_HOST=ojs-db
      - OJS_DB_USER=ojs
      - OJS_DB_PASSWORD=${DB_PASSWORD}
      - OJS_DB_NAME=ojs
      - SERVERNAME=${SERVERNAME}
    networks:
      - ojsnet
    ports:
      - "0.0.0.0:${UI_PORT}:8081"
    # Persisted on the host so config, uploads and public files survive
    # container recreation. The plugin creates these before first boot.
    volumes:
      - ./volumes/config/ojs.config.inc.php:/var/www/html/config.inc.php
      - ./volumes/public:/var/www/html/public
      - ./volumes/private:/var/www/files
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s

volumes:
  ojs_db:
