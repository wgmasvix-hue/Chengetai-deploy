# ChengetAi Deploy — WordPress stack (official Bitnami images).
# Instantiated per deployment into deployments/<name>/engine/ with a
# generated .env. Compose project name is chengetai-<deployment>.
# The administrator is created on first boot from the environment.
# Image tags can be changed with: chengetai edit config <name>

networks:
  wpnet:

services:
  wordpress-db:
    image: docker.io/bitnami/mariadb:11.4
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=bitnami_wordpress
      - MARIADB_USER=bn_wordpress
      - MARIADB_PASSWORD=${DB_PASSWORD}
    networks:
      - wpnet
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  wordpress:
    image: docker.io/bitnami/wordpress:6
    restart: unless-stopped
    depends_on:
      wordpress-db:
        condition: service_healthy
    environment:
      - WORDPRESS_DATABASE_HOST=wordpress-db
      - WORDPRESS_DATABASE_PORT_NUMBER=3306
      - WORDPRESS_DATABASE_USER=bn_wordpress
      - WORDPRESS_DATABASE_NAME=bitnami_wordpress
      - WORDPRESS_DATABASE_PASSWORD=${DB_PASSWORD}
      - WORDPRESS_USERNAME=${WP_ADMIN_USER}
      - WORDPRESS_PASSWORD=${WP_ADMIN_PASS}
      - WORDPRESS_EMAIL=${WP_ADMIN_EMAIL}
      - WORDPRESS_BLOG_NAME=${WP_SITE_NAME}
      - ALLOW_EMPTY_PASSWORD=no
    networks:
      - wpnet
    ports:
      - "0.0.0.0:${UI_PORT}:8080"
    volumes:
      - wordpress_data:/bitnami/wordpress
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/wp-login.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 120s

volumes:
  mariadb_data:
  wordpress_data:
