<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a6b2e"/>
      <stop offset="100%" stop-color="#0d4019"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M10,8 L54,8 L54,46 Q54,68 32,76 Q10,68 10,46 Z"
        fill="url(#shieldGrad)" stroke="#c8a400" stroke-width="2"/>

  <!-- Gold bar accent -->
  <rect x="10" y="20" width="44" height="5" fill="#c8a400"/>

  <!-- BP initials -->
  <text x="32" y="60"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="1">BP</text>

  <!-- Institution name -->
  <text x="72" y="28"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-weight="bold"
        fill="#1a6b2e" letter-spacing="0.5">BULAWAYO POLYTECHNIC</text>

  <!-- Tagline -->
  <text x="72" y="48"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#444444" letter-spacing="0.3">Institutional Repository</text>

  <!-- Gold underline -->
  <line x1="72" y1="54" x2="305" y2="54" stroke="#c8a400" stroke-width="2"/>

  <!-- Tagline bottom -->
  <text x="72" y="68"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5"
        fill="#888888" letter-spacing="0.2">Knowledge · Innovation · Excellence</text>
</svg>
