# ChengetAi Deploy — reverse proxy recipe.
# Serves the built dashboard and proxies the API under /api on one origin,
# so the browser makes same-origin requests (no CORS) and only this proxy
# is exposed. Terminate TLS here (certbot) before exposing beyond the LAN.
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/chengetai
#   sudo ln -s /etc/nginx/sites-available/chengetai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d chengetai.example.ac.zw   # TLS

server {
    listen 80;
    server_name _;

    # Built Angular dashboard (npm run build in dashboard/).
    root /opt/chengetai-deploy/dashboard/dist/chengetai-dashboard/browser;
    index index.html;

    # API — proxied to the localhost-bound service.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Deploy jobs can run for minutes.
        proxy_read_timeout 600s;
    }

    # SPA fallback: unknown paths serve the Angular entrypoint.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
