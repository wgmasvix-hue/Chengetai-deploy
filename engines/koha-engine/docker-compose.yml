version: "3.9"

# ============================================================
#  ChengetAi Koha Engine — Docker Compose Stack
#  Koha 24.05 · MariaDB 11 · OpenSearch 2 · Memcached · Nginx
# ============================================================

networks:
  koha-net:
    driver: bridge

volumes:
  koha_db_data:
  koha_os_data:
  koha_uploads:
  koha_config:
  koha_ssl:

services:

  # ── MariaDB 11 ─────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      koha_${KOHA_INSTANCE}
      MYSQL_USER:          koha_${KOHA_INSTANCE}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
      TZ:                  ${TZ:-UTC}
    volumes:
      - koha_db_data:/var/lib/mysql
    networks:
      - koha-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=64M
      --innodb_file_per_table=1

  # ── Memcached 1.6 ──────────────────────────────────────────
  memcached:
    image: memcached:1.6
    restart: unless-stopped
    command: memcached -m ${MEMCACHED_MAX_MEMORY:-256}
    networks:
      - koha-net
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc -w 1 localhost 11211 | grep -q uptime"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── OpenSearch 2 ───────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - TZ=${TZ:-UTC}
    volumes:
      - koha_os_data:/usr/share/opensearch/data
      - ./config/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    networks:
      - koha-net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Koha 24.05 ─────────────────────────────────────────────
  koha:
    build:
      context: ./docker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
      opensearch:
        condition: service_healthy
    environment:
      KOHA_INSTANCE:       ${KOHA_INSTANCE}
      KOHA_DB_HOST:        db
      KOHA_DB_NAME:        koha_${KOHA_INSTANCE}
      KOHA_DB_USER:        koha_${KOHA_INSTANCE}
      KOHA_DB_PASS:        ${MYSQL_PASSWORD}
      KOHA_DB_ROOT_PASS:   ${MYSQL_ROOT_PASSWORD}
      MEMCACHED_SERVERS:   memcached:11211
      OPENSEARCH_HOST:     opensearch
      OPENSEARCH_PORT:     9200
      KOHA_ADMIN_USER:     ${ADMIN_USER:-koha}
      KOHA_ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@example.com}
      KOHA_ADMIN_PASS:     ${ADMIN_PASS}
      INSTITUTION:         ${INSTITUTION:-My Library}
      OPAC_INTERNAL_PORT:  ${OPAC_INTERNAL_PORT:-8080}
      STAFF_INTERNAL_PORT: ${STAFF_INTERNAL_PORT:-8081}
      TZ:                  ${TZ:-UTC}
    volumes:
      - koha_uploads:/var/lib/koha/${KOHA_INSTANCE}/uploads
      - koha_config:/etc/koha/sites
    networks:
      - koha-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${OPAC_INTERNAL_PORT:-8080}/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── Nginx TLS Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      koha:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_STAFF_PORT:-8443}:8443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - koha_ssl:/etc/nginx/ssl:ro
    networks:
      - koha-net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && wget -qO- http://localhost/nginx-health 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
